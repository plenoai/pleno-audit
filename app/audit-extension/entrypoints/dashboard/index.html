<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pleno Audit - Dashboard</title>
    <style>
      :root {
        --background: #ffffff;
        --foreground: #111111;
        --primary: #000000;
        --primary-foreground: #ffffff;
        --secondary: #fafafa;
        --secondary-foreground: #111111;
        --tertiary: #f5f5f5;
        --muted: #555555;
        --muted-foreground: #555555;
        --border: #eaeaea;
        --border-light: #f5f5f5;
        --success: #22c55e;
        --success-foreground: #0a7227;
        --success-bg: #d3f9d8;
        --success-border: #b8f0c0;
        --warning: #f59e0b;
        --warning-foreground: #915b00;
        --warning-bg: #fff8e6;
        --warning-border: #ffe58f;
        --danger: #ef4444;
        --danger-foreground: #cc0000;
        --danger-bg: #ffeeee;
        --danger-border: #ffcccc;
        --info: #3b82f6;
        --info-foreground: #0050b3;
        --info-bg: #e6f4ff;
        --info-border: #91caff;
        --link: #0070f3;
        --scrollbar-track: hsl(0 0% 95%);
        --scrollbar-thumb: hsl(0 0% 75%);
        --scrollbar-thumb-hover: hsl(0 0% 60%);
      }
      .dark {
        color-scheme: dark;
        --background: #1a1a1a;
        --foreground: #e5e5e5;
        --primary: #ffffff;
        --primary-foreground: #000000;
        --secondary: #222222;
        --secondary-foreground: #e5e5e5;
        --tertiary: #2a2a2a;
        --muted: #b0b0b0;
        --muted-foreground: #b0b0b0;
        --border: #333333;
        --border-light: #2a2a2a;
        --success: #4ade80;
        --success-foreground: #4ade80;
        --success-bg: #0a3d1a;
        --success-border: #166534;
        --warning: #fbbf24;
        --warning-foreground: #fbbf24;
        --warning-bg: #3d2e0a;
        --warning-border: #92400e;
        --danger: #f87171;
        --danger-foreground: #f87171;
        --danger-bg: #3d0a0a;
        --danger-border: #991b1b;
        --info: #60a5fa;
        --info-foreground: #60a5fa;
        --info-bg: #0a2a3d;
        --info-border: #1e40af;
        --link: #60a5fa;
        --scrollbar-track: #2a2a2a;
        --scrollbar-thumb: #555555;
        --scrollbar-thumb-hover: #666666;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        color: var(--foreground);
        background: var(--secondary);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      .hover-bg {
        transition: background-color 0.15s;
      }
      .hover-bg:hover {
        background-color: var(--secondary);
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes skeleton-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
